<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1분 자기소개 생성기</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy-950: #080f20;
      --navy-900: #0d1b38;
      --navy-800: #132247;
      --navy-700: #1a2f5e;
      --navy-600: #1e3a6e;
      --navy-500: #244a8a;
      --navy-400: #2d5fa8;
      --navy-300: #4a80cc;
      --navy-200: #7aaee0;
      --navy-100: #c0d8f2;
      --navy-50:  #eaf2fb;
      --white: #ffffff;
      --text-on-dark: rgba(255,255,255,0.92);
      --text-on-dark-sub: rgba(255,255,255,0.55);
      --text-on-dark-muted: rgba(255,255,255,0.32);
      --glass: rgba(255,255,255,0.06);
      --glass-border: rgba(255,255,255,0.12);
      --glass-hover: rgba(255,255,255,0.10);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Pretendard', 'Noto Sans KR', sans-serif;
      background: var(--navy-950);
      color: var(--text-on-dark);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      text-align: center;
      padding: 100px 1.5rem 60px;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(74,128,204,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-eyebrow {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--navy-300);
      margin-bottom: 1.25rem;
    }

    .hero h1 {
      font-size: clamp(36px, 6vw, 58px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--white);
      margin-bottom: 1rem;
    }

    .hero h1 span {
      background: linear-gradient(135deg, var(--navy-200) 0%, var(--white) 60%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 17px;
      color: var(--text-on-dark-sub);
      line-height: 1.6;
      max-width: 420px;
      margin: 0 auto;
      font-weight: 400;
    }

    /* ── Main layout ── */
    .main {
      max-width: 620px;
      margin: 0 auto;
      padding: 0 1.5rem 6rem;
    }

    /* ── Steps ── */
    .step {
      position: relative;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 1.5rem 1.75rem;
      margin-bottom: 12px;
      transition: border-color 0.2s, background 0.2s;
    }

    .step:focus-within {
      border-color: rgba(74,128,204,0.5);
      background: var(--glass-hover);
    }

    .step-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1rem;
    }

    .step-num {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      background: var(--navy-400);
      color: var(--white);
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-on-dark);
      letter-spacing: -0.01em;
    }

    .keyword-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.65;
      padding: 11px 14px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.04);
      color: var(--text-on-dark);
      outline: none;
      resize: vertical;
      transition: border-color 0.18s, background 0.18s;
      -webkit-font-smoothing: antialiased;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: var(--navy-300);
      background: rgba(255,255,255,0.07);
    }

    input[type="text"]::placeholder,
    textarea::placeholder {
      color: var(--text-on-dark-muted);
      font-size: 13px;
    }

    /* ── Generate button ── */
    .generate-wrap {
      margin-top: 8px;
    }

    .generate-btn {
      width: 100%;
      padding: 16px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
      background: var(--white);
      color: var(--navy-900);
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .generate-btn svg {
      width: 18px;
      height: 18px;
      stroke: var(--navy-900);
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .generate-btn:hover { opacity: 0.90; }
    .generate-btn:active { transform: scale(0.985); }

    /* ── Error ── */
    .error {
      display: none;
      font-size: 13px;
      color: #fca5a5;
      margin: 0.75rem 0 0;
      padding: 0.6rem 1rem;
      background: rgba(220, 38, 38, 0.15);
      border-radius: 10px;
      border: 1px solid rgba(220, 38, 38, 0.25);
    }

    /* ── Result ── */
    .result-box {
      display: none;
      margin-top: 20px;
      background: var(--white);
      border-radius: 24px;
      padding: 2rem 2rem 1.5rem;
      animation: slideUp 0.35s cubic-bezier(0.22,1,0.36,1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .result-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--navy-500);
    }

    .result-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .char-count {
      font-size: 12px;
      color: #94a3b8;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      background: transparent;
      color: #475569;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }

    .icon-btn:hover { background: #f1f5f9; border-color: #cbd5e1; }

    .icon-btn svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .result-divider {
      height: 1px;
      background: #f1f5f9;
      margin-bottom: 1.25rem;
    }

    .result-text {
      font-size: 17px;
      font-weight: 400;
      line-height: 1.95;
      color: #0f172a;
      word-break: keep-all;
      letter-spacing: -0.01em;
    }

    .result-hint {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid #f1f5f9;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem 1rem 3rem;
      font-size: 12px;
      color: var(--text-on-dark-muted);
    }
  </style>
</head>
<body>

  <section class="hero">
    <span class="hero-eyebrow">취업 준비 도구</span>
    <h1>1분 자기소개<br><span>생성기</span></h1>
    <p class="hero-sub">4가지 항목만 채우면<br>면접관의 시선을 사로잡는 자기소개가 완성됩니다</p>
  </section>

  <main class="main">

    <div class="step">
      <div class="step-header">
        <div class="step-num">1</div>
        <span class="step-title">나를 표현하는 키워드 3가지</span>
      </div>
      <div class="keyword-row">
        <input type="text" id="kw1" placeholder="예: 꼼꼼함">
        <input type="text" id="kw2" placeholder="예: 도전정신">
        <input type="text" id="kw3" placeholder="예: 협업">
      </div>
    </div>

    <div class="step">
      <div class="step-header">
        <div class="step-num">2</div>
        <span class="step-title">대표 경험 — 구체적인 성과 숫자 포함</span>
      </div>
      <textarea id="exp" rows="3" placeholder="예: 마케팅 인턴 당시 SNS 콘텐츠 기획으로 팔로워 30% 증가, 월 매출 15% 향상에 기여했습니다."></textarea>
    </div>

    <div class="step">
      <div class="step-header">
        <div class="step-num">3</div>
        <span class="step-title">지원 직무와의 연결고리</span>
      </div>
      <textarea id="link" rows="2" placeholder="예: 데이터 기반 의사결정 역량을 키웠고, 마케팅 기획 직무에 직접 활용할 수 있습니다."></textarea>
    </div>

    <div class="step">
      <div class="step-header">
        <div class="step-num">4</div>
        <span class="step-title">포부 한 문장</span>
      </div>
      <input type="text" id="aspire" placeholder="예: 입사 후 3년 안에 핵심 프로젝트를 이끄는 팀원이 되겠습니다.">
    </div>

    <div class="generate-wrap">
      <p class="error" id="err">모든 항목을 빠짐없이 입력해 주세요.</p>
      <button class="generate-btn" onclick="generate()">
        <svg viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        자기소개 생성하기
      </button>
    </div>

    <div class="result-box" id="result-box">
      <div class="result-top">
        <span class="result-label">1분 자기소개</span>
        <div class="result-actions">
          <span class="char-count" id="char-count"></span>
          <button class="icon-btn" onclick="generate()">
            <svg viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
            다시 생성
          </button>
          <button class="icon-btn" id="copy-btn" onclick="copyText()">
            <svg id="copy-icon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            복사
          </button>
        </div>
      </div>
      <div class="result-divider"></div>
      <p class="result-text" id="result-text"></p>
      <p class="result-hint">자신의 말투에 맞게 다듬어 사용하세요. 다시 생성하면 다른 표현으로 바뀝니다.</p>
    </div>

  </main>

  <footer>
    <p>입력하신 내용은 저장되지 않습니다</p>
  </footer>

  <script>
    const OPENERS = [
      (k1,k2,k3) => `저는 ${k1}과 ${k2}, 그리고 ${k3}을 제 가장 큰 강점으로 삼아 성장해온 지원자입니다.`,
      (k1,k2,k3) => `${k1}함과 ${k2}, ${k3}이라는 세 가지 키워드로 스스로를 소개하고 싶습니다.`,
      (k1,k2,k3) => `저를 한마디로 표현하자면 '${k1}하고 ${k2}하며 ${k3}을 아는 사람'이라고 할 수 있습니다.`,
    ];
    const EXP_BRIDGES = [
      (e) => `실제로 ${e}.`,
      (e) => `그 강점이 가장 잘 드러난 순간은 ${e}.`,
      (e) => `이 강점을 가장 잘 보여주는 경험이 있습니다. ${e}.`,
    ];
    const LINK_BRIDGES = [
      (l) => `이 경험은 단순한 성과에 그치지 않았고, ${l}.`,
      (l) => `단순히 결과만 낸 것이 아니라, ${l}.`,
      (l) => `그 과정에서 ${l}.`,
    ];
    const ASPIRE_BRIDGES = [
      (a) => `앞으로도 ${a}.`,
      (a) => `${a}.`,
      (a) => `입사 이후에는 ${a}.`,
    ];

    const strip = s => s.replace(/[.。]+$/, '').trim();
    const pick  = (arr, ...args) => arr[Math.floor(Math.random() * arr.length)](...args);

    function generate() {
      const kw1    = document.getElementById('kw1').value.trim();
      const kw2    = document.getElementById('kw2').value.trim();
      const kw3    = document.getElementById('kw3').value.trim();
      const exp    = strip(document.getElementById('exp').value.trim());
      const link   = strip(document.getElementById('link').value.trim());
      const aspire = strip(document.getElementById('aspire').value.trim());
      const err    = document.getElementById('err');

      if (!kw1 || !kw2 || !kw3 || !exp || !link || !aspire) {
        err.style.display = 'block';
        return;
      }
      err.style.display = 'none';

      const intro = [
        pick(OPENERS, kw1, kw2, kw3),
        pick(EXP_BRIDGES, exp),
        pick(LINK_BRIDGES, link),
        pick(ASPIRE_BRIDGES, aspire),
      ].join(' ');

      const box    = document.getElementById('result-box');
      const textEl = document.getElementById('result-text');
      const countEl = document.getElementById('char-count');

      const wasHidden = box.style.display === 'none' || !box.style.display;
      box.style.display = 'none';
      textEl.textContent = intro;

      const len  = intro.length;
      const note = len < 180 ? ' · 조금 짧습니다' : len > 260 ? ' · 조금 깁니다' : '';
      countEl.textContent = len + '자' + note;

      requestAnimationFrame(() => {
        box.style.display = 'block';
        if (wasHidden) box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });

      resetCopyBtn();
    }

    function copyText() {
      const text = document.getElementById('result-text').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;fill:none"><polyline points="20 6 9 17 4 12"/></svg> 복사됨`;
        setTimeout(resetCopyBtn, 1800);
      });
    }

    function resetCopyBtn() {
      const btn = document.getElementById('copy-btn');
      if (btn) btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 복사`;
    }

    document.querySelectorAll('input[type="text"]').forEach(el => {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); generate(); }
      });
    });
  </script>
</body>
</html>
